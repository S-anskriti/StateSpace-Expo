<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StateSpace Expo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════════ */
:root {
  --bg:    #07071a;
  --s1:    #0c0c22;
  --s2:    #11112e;
  --s3:    #16163a;
  --s4:    #1c1c46;
  --bd:    rgba(255,255,255,0.06);
  --bd2:   rgba(255,255,255,0.11);
  --txt:   #e8eaff;
  --mut:   #5860a0;
  --dim:   #2a2a60;

  /* ALGORITHM STATE COLORS — the key to clarity */
  --col-frontier: #f59e0b;   /* amber  — being considered RIGHT NOW */
  --col-visited:  #3b82f6;   /* blue   — already explored */
  --col-path:     #10b981;   /* emerald — the solution */
  --col-wall:     #1e1e4a;   /* dark   — blocked */
  --col-start:    #8b5cf6;   /* purple — origin */
  --col-end:      #ef4444;   /* red    — destination */
  --col-current:  #f59e0b;   /* same as frontier */

  --accent: #6c63ff;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { font-family:var(--sans); background:var(--bg); color:var(--txt); display:flex; flex-direction:column; }

/* ══════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════ */
.topbar {
  height:50px; display:flex; align-items:center; padding:0 20px; gap:16px;
  background:var(--s1); border-bottom:1px solid var(--bd); flex-shrink:0; z-index:100;
}
.brand { display:flex; align-items:baseline; gap:2px; }
.brand-main { font-size:18px; font-weight:900; color:var(--txt); letter-spacing:-0.5px; }
.brand-main em { color:#6c63ff; font-style:normal; }
.brand-sub { font:600 10px var(--mono); color:var(--mut); letter-spacing:2px; margin-left:8px; }
.topbar-div { width:1px; height:22px; background:var(--bd2); }

/* COLOR LEGEND in topbar */
.legend { display:flex; align-items:center; gap:12px; margin-left:4px; }
.leg-item { display:flex; align-items:center; gap:5px; font:600 10px var(--mono); color:var(--mut); }
.leg-dot { width:10px; height:10px; border-radius:2px; }
.leg-dot.frontier { background:var(--col-frontier); box-shadow:0 0 6px var(--col-frontier); }
.leg-dot.visited   { background:var(--col-visited);  box-shadow:0 0 6px var(--col-visited); }
.leg-dot.path      { background:var(--col-path);     box-shadow:0 0 6px var(--col-path); }
.leg-dot.start     { background:var(--col-start);    box-shadow:0 0 6px var(--col-start); }
.leg-dot.end       { background:var(--col-end);      box-shadow:0 0 6px var(--col-end); }

/* ══════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════ */
.layout { display:flex; flex:1; overflow:hidden; }

/* ══════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════ */
.sidebar {
  width:210px; min-width:210px; overflow-y:auto;
  background:var(--s1); border-right:1px solid var(--bd);
  padding:8px 0 20px; display:flex; flex-direction:column;
}
.sb-grp { margin-bottom:4px; }
.sb-grp-label {
  font:700 8px var(--mono); letter-spacing:3px; color:var(--mut);
  text-transform:uppercase; padding:12px 14px 5px; opacity:.6;
}
.sb-item {
  display:flex; align-items:center; gap:9px;
  margin:1px 6px; padding:7px 10px; border-radius:8px;
  border:none; background:transparent; cursor:pointer;
  font-family:var(--sans); text-align:left; width:calc(100% - 12px);
  transition:background .15s; color:var(--mut);
}
.sb-item:hover { background:var(--s2); color:var(--txt); }
.sb-item.active { background:var(--s3); color:var(--txt); }
.sb-ico { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; background:var(--s3); }
.sb-item.active .sb-ico { background:var(--s4); }
.sb-text { display:flex; flex-direction:column; gap:1px; }
.sb-name { font-size:11.5px; font-weight:700; line-height:1.2; }
.sb-tag  { font:400 9px var(--mono); color:var(--mut); }

/* ══════════════════════════════════════════════
   MAIN
══════════════════════════════════════════════ */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* ══════════════════════════════════════════════
   TOOLBAR
══════════════════════════════════════════════ */
.toolbar {
  height:48px; display:flex; align-items:center; gap:8px; padding:0 14px;
  background:var(--s1); border-bottom:1px solid var(--bd); flex-shrink:0;
}
.tb-title { font-size:14px; font-weight:800; white-space:nowrap; color:var(--txt); }
.vdiv { width:1px; height:20px; background:var(--bd2); }
select.sel {
  padding:4px 10px; border-radius:6px; border:1px solid var(--bd2);
  background:var(--s2); color:var(--txt); font:600 11px var(--sans);
  cursor:pointer; outline:none;
}
.btn {
  padding:4px 14px; border-radius:6px; border:1px solid var(--bd2);
  background:var(--s2); color:var(--mut); font:600 11px var(--sans);
  cursor:pointer; transition:all .13s; white-space:nowrap; outline:none;
}
.btn:hover { color:var(--txt); background:var(--s3); }
.btn:active { transform:scale(.97); }
.btn.run { background:#6c63ff; color:#fff; border:none; font-weight:700; letter-spacing:.3px; }
.btn.run:hover { background:#7c74ff; }
.btn.run:disabled { opacity:.35; cursor:not-allowed; transform:none; }
.btn.danger { color:#ef4444; border-color:rgba(239,68,68,.2); }
.btn.danger:hover { background:rgba(239,68,68,.08); color:#ff6b6b; }
.sp { flex:1; }
.spd-wrap { display:flex; align-items:center; gap:6px; }
.spd-lbl { font:600 10px var(--mono); color:var(--mut); min-width:34px; text-align:right; }
input[type=range] { width:72px; accent-color:#f59e0b; cursor:pointer; }
.step-pill { font:600 10px var(--mono); padding:3px 9px; border-radius:10px; background:var(--s2); border:1px solid var(--bd); color:var(--mut); }

/* ══════════════════════════════════════════════
   WORKSPACE
══════════════════════════════════════════════ */
.workspace { display:flex; flex:1; overflow:hidden; }

/* CANVAS */
.canvas-wrap {
  flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative;
}
.canvas-area {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:14px; overflow:hidden; position:relative;
}
canvas { display:block; border-radius:10px; }

/* LIVE STATUS BAR below canvas */
.status-bar {
  height:38px; min-height:38px; display:flex; align-items:center; gap:0;
  background:var(--s1); border-top:1px solid var(--bd); padding:0 14px;
  font:600 10px var(--mono); overflow:hidden;
}
.status-phase {
  display:flex; align-items:center; gap:7px; padding:0 14px 0 0;
  border-right:1px solid var(--bd); margin-right:14px;
}
.phase-dot { width:8px; height:8px; border-radius:50%; transition:background .3s; }
.status-msg { color:var(--mut); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.status-counters { display:flex; gap:0; margin-left:auto; }
.sc-item { padding:0 14px; border-left:1px solid var(--bd); display:flex; flex-direction:column; align-items:center; gap:1px; }
.sc-val { font:700 13px var(--mono); color:var(--txt); }
.sc-key { font:400 8px var(--mono); color:var(--mut); letter-spacing:1px; text-transform:uppercase; }

/* ══════════════════════════════════════════════
   RIGHT PANEL
══════════════════════════════════════════════ */
.rpanel {
  width:262px; min-width:262px; overflow-y:auto;
  background:var(--s1); border-left:1px solid var(--bd);
  display:flex; flex-direction:column;
}
.rp-sec { padding:12px 14px; border-bottom:1px solid var(--bd); }
.rp-lbl { font:700 8px var(--mono); letter-spacing:2.5px; color:var(--mut); text-transform:uppercase; margin-bottom:8px; }

/* Algorithm card */
.acard { background:var(--s2); border:1px solid var(--bd); border-radius:9px; padding:12px 13px; }
.acard-name { font-size:12px; font-weight:800; margin-bottom:4px; }
.acard-desc { font-size:10px; color:var(--mut); line-height:1.7; margin-bottom:9px; }
.tags { display:flex; flex-wrap:wrap; gap:4px; }
.tag { font:600 9px var(--mono); padding:2px 6px; border-radius:4px; border:1px solid var(--bd); background:rgba(255,255,255,.03); color:var(--mut); }
.tag.g { background:rgba(16,185,129,.08); border-color:rgba(16,185,129,.25); color:#10b981; }
.tag.r { background:rgba(239,68,68,.08); border-color:rgba(239,68,68,.25); color:#ef4444; }
.tag.y { background:rgba(245,158,11,.08); border-color:rgba(245,158,11,.25); color:#f59e0b; }
.tag.b { background:rgba(59,130,246,.08); border-color:rgba(59,130,246,.25); color:#3b82f6; }

/* Color guide in panel */
.color-guide { display:flex; flex-direction:column; gap:6px; }
.cg-row { display:flex; align-items:center; gap:9px; font:500 10px var(--mono); color:var(--mut); }
.cg-swatch { width:32px; height:14px; border-radius:3px; flex-shrink:0; }
.cg-label { flex:1; }
.cg-count { font-weight:700; color:var(--txt); }

/* Step log */
.step-log { flex:1; overflow-y:auto; padding:8px 12px; display:flex; flex-direction:column; gap:2px; }
.sle { font:400 9.5px var(--mono); color:var(--mut); padding:3px 6px; border-radius:4px; line-height:1.5; }
.sle.frontier { color:#f59e0b; background:rgba(245,158,11,.06); border-left:2px solid rgba(245,158,11,.4); }
.sle.visited  { color:#3b82f6; background:rgba(59,130,246,.06);  border-left:2px solid rgba(59,130,246,.4); }
.sle.path     { color:#10b981; background:rgba(16,185,129,.08);  border-left:2px solid rgba(16,185,129,.5); font-weight:700; }
.sle.err      { color:#ef4444; background:rgba(239,68,68,.06);   border-left:2px solid rgba(239,68,68,.4); }
.sle.info     { color:#6c63ff; border-left:2px solid rgba(108,99,255,.4); }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:4px; }

/* extra toolbar items */
#extra-tools { display:flex; align-items:center; gap:6px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-main"><em>State</em>Space</span>
    <span class="brand-sub">EXPO</span>
  </div>
  <div class="topbar-div"></div>
  <!-- GLOBAL COLOR LEGEND -->
  <div class="legend">
    <div class="leg-item"><div class="leg-dot start"></div>Start</div>
    <div class="leg-item"><div class="leg-dot end"></div>Goal</div>
    <div class="leg-item"><div class="leg-dot frontier"></div>Frontier</div>
    <div class="leg-item"><div class="leg-dot visited"></div>Visited</div>
    <div class="leg-item"><div class="leg-dot path"></div>Path</div>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar"></div>

  <!-- MAIN -->
  <div class="main">
    <!-- TOOLBAR -->
    <div class="toolbar">
      <span class="tb-title" id="tb-title">Maze Pathfinding</span>
      <div class="vdiv"></div>
      <select class="sel" id="algo-sel" onchange="onAlgoChange()"></select>
      <button class="btn run" id="run-btn" onclick="doRun()">▶ Run</button>
      <button class="btn" onclick="doReset()">↺ Reset</button>
      <button class="btn danger" onclick="doClear()">✕ Clear</button>
      <div id="extra-tools"></div>
      <div class="sp"></div>
      <div class="spd-wrap">
        <span style="font:600 10px var(--mono);color:var(--mut)">Speed</span>
        <input type="range" min="1" max="5" value="3" id="spd" oninput="setSpeed(this.value)">
        <span class="spd-lbl" id="spd-lbl">Med</span>
      </div>
      <span class="step-pill" id="step-pill">Step 0</span>
    </div>

    <div class="workspace">
      <!-- CANVAS + STATUS -->
      <div class="canvas-wrap">
        <div class="canvas-area" id="canvas-area">
          <canvas id="cv"></canvas>
        </div>
        <!-- LIVE STATUS BAR -->
        <div class="status-bar">
          <div class="status-phase">
            <div class="phase-dot" id="phase-dot" style="background:var(--mut)"></div>
            <span id="phase-txt" style="font:700 10px var(--mono);color:var(--mut)">READY</span>
          </div>
          <span class="status-msg" id="status-msg">Select an algorithm and click Run</span>
          <div class="status-counters">
            <div class="sc-item"><div class="sc-val" id="sc-vis">0</div><div class="sc-key">Visited</div></div>
            <div class="sc-item"><div class="sc-val" id="sc-frt">0</div><div class="sc-key">Frontier</div></div>
            <div class="sc-item"><div class="sc-val" id="sc-res">—</div><div class="sc-key">Result</div></div>
            <div class="sc-item"><div class="sc-val" id="sc-time">0ms</div><div class="sc-key">Time</div></div>
          </div>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="rpanel">
        <div class="rp-sec">
          <div class="rp-lbl">Algorithm</div>
          <div id="algo-mount"></div>
        </div>
        <div class="rp-sec">
          <div class="rp-lbl">Color Key</div>
          <div class="color-guide">
            <div class="cg-row"><div class="cg-swatch" style="background:#8b5cf6"></div><span class="cg-label">Start node</span><span class="cg-count" id="ck-start">—</span></div>
            <div class="cg-row"><div class="cg-swatch" style="background:#ef4444"></div><span class="cg-label">Goal node</span><span class="cg-count" id="ck-end">—</span></div>
            <div class="cg-row"><div class="cg-swatch" style="background:#f59e0b;box-shadow:0 0 8px #f59e0b55"></div><span class="cg-label">Frontier (queue)</span><span class="cg-count" id="ck-frt">0</span></div>
            <div class="cg-row"><div class="cg-swatch" style="background:#3b82f6;box-shadow:0 0 8px #3b82f655"></div><span class="cg-label">Visited (explored)</span><span class="cg-count" id="ck-vis">0</span></div>
            <div class="cg-row"><div class="cg-swatch" style="background:#10b981;box-shadow:0 0 8px #10b98155"></div><span class="cg-label">Path (solution)</span><span class="cg-count" id="ck-path">—</span></div>
          </div>
        </div>
        <div class="rp-sec">
          <div class="rp-lbl">Problem</div>
          <div id="prob-mount"></div>
        </div>
        <div class="rp-sec" style="border:none;padding-bottom:4px">
          <div class="rp-lbl">Step Log</div>
        </div>
        <div class="step-log" id="step-log"></div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
